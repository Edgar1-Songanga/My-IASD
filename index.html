<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IASD Super App</title>

<style>
:root {
  --primary:#003366;
  --secondary:#0055a5;
  --accent:#f5a623;
  --bg:#f7f9fb;
  --card:#ffffff;
}

* { box-sizing:border-box; margin:0; padding:0; font-family:system-ui; }

body { background:var(--bg); color:#111; }

/* HEADER */
header {
  background:linear-gradient(135deg, #003366, #0055a5);
  color:#fff;
  padding:20px;
  border-radius:0 0 20px 20px;
}

/* NAV */
nav {
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
}

nav button {
  background:#fff;
  border:none;
  padding:10px 15px;
  border-radius:20px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  cursor:pointer;
}

/* CONTAINER */
.container { padding:15px; }

/* CARDS */
.card {
  background:var(--card);
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
  box-shadow:0 6px 20px rgba(0,0,0,0.05);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-2px);
}

/* INPUT */
input, select, textarea {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

/* BUTTON */
button.primary {
  background:var(--accent);
  color:#fff;
  border:none;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  font-weight:bold;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
  gap:10px;
}

/* MODULE */
.module { display:none; }
.active { display:block; }

/* LANGUAGE */
.lang {
  float:right;
  background:#fff;
  color:#000;
  padding:5px 10px;
  border-radius:10px;
}

/* MOBILE */
@media(max-width:600px){
  header h2 { font-size:18px; }
}
</style>
</head>

<body>

<header>
<h2 id="title">IASD Super App</h2>

<select class="lang" onchange="setLang(this.value)">
<option value="pt">PT</option>
<option value="en">EN</option>
<option value="ow">Oshiwambo</option>
<option value="sw">Swahili</option>
<option value="um">Umbundu</option>
<option value="ki">Kimbundu</option>
</select>

<p id="subtitle">União Nordeste de Angola</p>
</header>

<nav>
<button onclick="show('home')">🏠</button>
<button onclick="show('perfil')">👤</button>
<button onclick="show('mensagens')">📢</button>
<button onclick="show('departamentos')">🏛️</button>
<button onclick="show('relatorios')">📊</button>
</nav>

<div class="container">

<!-- HOME -->
<div id="home" class="module active">
<div class="card">
<h3 id="welcome">Bem-vindo</h3>
<p id="userInfo"></p>
</div>

<div class="grid">
<div class="card">📖 Devocional</div>
<div class="card">🎵 Hinário</div>
<div class="card">🎮 Jogos Bíblicos</div>
<div class="card">📡 Lives</div>
</div>
</div>

<!-- PERFIL -->
<div id="perfil" class="module">
<div class="card">
<input id="nome" placeholder="Nome">
<input id="funcao" placeholder="Função">
<input id="nivel" placeholder="Nível">
<textarea id="bio" placeholder="Biografia"></textarea>
<button class="primary" onclick="savePerfil()">Guardar</button>
</div>

<div id="perfilView"></div>
</div>

<!-- MENSAGENS -->
<div id="mensagens" class="module">
<div id="msgForm" class="card" style="display:none">
<textarea id="msgText" placeholder="Mensagem espiritual"></textarea>
<button class="primary" onclick="postMensagem()">Publicar</button>
</div>

<div id="msgList"></div>
</div>

<!-- DEPARTAMENTOS -->
<div id="departamentos" class="module">
<div class="card">
<input id="depName" placeholder="Departamento">
<button class="primary" onclick="addDep()">Adicionar</button>
</div>

<div id="depList"></div>
</div>

<!-- RELATORIOS -->
<div id="relatorios" class="module">
<div class="card">
<select id="depSelect"></select>
<textarea id="relText" placeholder="Relatório"></textarea>
<button class="primary" onclick="addRel()">Enviar</button>
</div>

<div id="relList"></div>
</div>

</div>

<script>

/* DB */
let db = JSON.parse(localStorage.getItem("db")) || {
  perfis:[], mensagens:[], departamentos:[], relatorios:[]
};

let user = {role:"pastor", igreja:"Central"}; // demo

/* LANGUAGES */
const langData = {
  pt:{welcome:"Bem-vindo"},
  en:{welcome:"Welcome"},
  ow:{welcome:"Wa uhala po"},
  sw:{welcome:"Karibu"},
  um:{welcome:"Ongola"},
  ki:{welcome:"Kia kuetu"}
};

function setLang(l){
  document.getElementById("welcome").innerText = langData[l].welcome;
}

/* NAV */
function show(id){
  document.querySelectorAll(".module").forEach(m=>m.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* PERFIL */
function savePerfil(){
  let perfil = {
    nome:nome.value,
    funcao:funcao.value,
    nivel:nivel.value,
    bio:bio.value
  };
  db.perfis=[perfil];
  save();
  renderPerfil();
}

function renderPerfil(){
  let p=db.perfis[0];
  if(!p) return;
  perfilView.innerHTML=`
  <div class="card">
    <h3>${p.nome}</h3>
    <p>${p.funcao}</p>
    <p>${p.nivel}</p>
    <p>${p.bio}</p>
  </div>`;
}

/* MENSAGENS */
function postMensagem(){
  db.mensagens.unshift(msgText.value);
  save();
  renderMensagens();
}

function renderMensagens(){
  msgList.innerHTML="";
  db.mensagens.forEach(m=>{
    msgList.innerHTML+=`<div class="card">${m}</div>`;
  });
}

/* DEPARTAMENTOS */
function addDep(){
  db.departamentos.push(depName.value);
  save();
  renderDeps();
}

function renderDeps(){
  depList.innerHTML="";
  depSelect.innerHTML="";
  db.departamentos.forEach(d=>{
    depList.innerHTML+=`<div class="card">${d}</div>`;
    depSelect.innerHTML+=`<option>${d}</option>`;
  });
}

/* RELATÓRIOS */
function addRel(){
  db.relatorios.push({dep:depSelect.value,text:relText.value});
  save();
  renderRel();
}

function renderRel(){
  relList.innerHTML="";
  db.relatorios.forEach(r=>{
    relList.innerHTML+=`<div class="card"><strong>${r.dep}</strong><br>${r.text}</div>`;
  });
}

/* STORAGE */
function save(){ localStorage.setItem("db", JSON.stringify(db)); }

/* INIT */
renderPerfil();
renderMensagens();
renderDeps();
renderRel();

</script>

</body>
  </html>
