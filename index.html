<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNA Digital Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#002D5E;
  --accent:#C5A059;
  --bg:#f4f6f8;
  --card:#fff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter';}

body{background:var(--bg);display:flex;height:100vh;}

/* SIDEBAR */
aside{
  width:260px;
  background:#fff;
  padding:20px;
}

.nav-item{
  padding:12px;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:8px;
}

.nav-item:hover{background:#eee;}
.active{background:var(--primary);color:#fff;}

/* MAIN */
main{flex:1;display:flex;flex-direction:column;}

header{
  padding:15px;
  background:var(--primary);
  color:#fff;
  display:flex;
  justify-content:space-between;
}

.container{
  padding:20px;
  overflow:auto;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

button{
  padding:10px;
  border:none;
  background:var(--primary);
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<aside>
<h3>UNA Digital</h3>

<div class="nav-item active" onclick="nav('feed', this)">Feed</div>
<div class="nav-item" onclick="nav('perfil', this)">Perfil</div>
<div class="nav-item" onclick="nav('radio', this)">Rádio</div>
<div class="nav-item" onclick="nav('devocional', this)">Devocional</div>
<div class="nav-item" onclick="nav('licao', this)">Lição</div>

</aside>

<!-- MAIN -->
<main>

<header>
<span id="userInfo"></span>
<button onclick="logout()">Sair</button>
</header>

<div class="container">

<!-- FEED -->
<div id="feed" class="view">

<div class="card">
<textarea id="postText" placeholder="Partilhar mensagem..."></textarea>
<button onclick="createPost()">Publicar</button>
</div>

<div id="posts"></div>

</div>

<!-- PERFIL -->
<div id="perfil" class="view" style="display:none;">
<div class="card">
<input id="name" placeholder="Nome">
<textarea id="bio" placeholder="Bio"></textarea>
<button onclick="saveProfile()">Guardar</button>
</div>

<div id="profileView"></div>
</div>

<!-- RADIO -->
<div id="radio" class="view" style="display:none;">
<div class="card">
<h3>Rádio Novo Advento</h3>
<audio controls style="width:100%">
<source src="https://stream.radiojar.com/4ywdgup3bnzuv" type="audio/mpeg">
</audio>
</div>
</div>

<!-- DEVOCIONAL -->
<div id="devocional" class="view" style="display:none;">
<div class="card">
<h3>Devocional</h3>
<p>Entrega o teu caminho ao Senhor...</p>
</div>
</div>

<!-- LIÇÃO -->
<div id="licao" class="view" style="display:none;">
<div class="card">
<h3>Escola Sabatina</h3>
<p>Lição da semana disponível.</p>
</div>
</div>

</div>

</main>

<script>

/* ===== BACKEND SIMULADO ===== */
let DB = JSON.parse(localStorage.getItem("una_db")) || {
  users:[],
  posts:[],
  profiles:[],
  follows:[]
};

let session = JSON.parse(localStorage.getItem("session")) || null;

/* LOGIN SIMPLES */
if(!session){
  let name = prompt("Nome:");
  let church = prompt("Igreja:");

  session = {name, church};
  localStorage.setItem("session", JSON.stringify(session));
}

/* USER INFO */
userInfo.innerText = session.name + " | " + session.church;

/* NAV */
function nav(id, el){
  document.querySelectorAll(".view").forEach(v=>v.style.display="none");
  document.getElementById(id).style.display="block";

  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  el.classList.add("active");
}

/* POSTS */
function createPost(){
  DB.posts.unshift({
    user:session.name,
    church:session.church,
    text:postText.value,
    likes:0
  });

  save();
  renderPosts();
}

function likePost(i){
  DB.posts[i].likes++;
  save();
  renderPosts();
}

function renderPosts(){
  posts.innerHTML="";

  DB.posts
  .filter(p=>p.church===session.church)
  .forEach((p,i)=>{
    posts.innerHTML+=`
      <div class="card">
        <b>${p.user}</b><br>
        ${p.text}<br><br>
        ❤️ ${p.likes}
        <button onclick="likePost(${i})">Curtir</button>
      </div>
    `;
  });
}

/* PROFILE */
function saveProfile(){
  DB.profiles = DB.profiles.filter(p=>p.user!==session.name);

  DB.profiles.push({
    user:session.name,
    bio:bio.value
  });

  save();
  renderProfile();
}

function renderProfile(){
  let p = DB.profiles.find(x=>x.user===session.name);

  profileView.innerHTML = p ? `
    <div class="card">
      <h3>${p.user}</h3>
      <p>${p.bio}</p>
    </div>
  ` : "";
}

/* STORAGE */
function save(){
  localStorage.setItem("una_db", JSON.stringify(DB));
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("session");
  location.reload();
}

/* INIT */
renderPosts();
renderProfile();

</script>

</body>
</html>
