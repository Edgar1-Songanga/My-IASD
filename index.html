<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNA Digital | Veltrix OS</title>

<!-- CORRIGIDO -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>

<style>
:root {
--bg:#0a0d14;--card:#161b22;--primary:#4f46e5;
--success:#10b981;--danger:#ef4444;
--text:#e6edf3;--text-muted:#8b949e;--border:#30363d;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter'}
body{background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}

/* LOGIN */
#auth-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:1000}
.auth-card{background:var(--card);padding:30px;border-radius:16px;border:1px solid var(--border)}

/* LAYOUT */
#app-shell{display:none;width:100%}
aside{width:260px;background:#0d1117;padding:20px}
.nav-item{padding:10px;border-radius:8px;margin-bottom:5px;cursor:pointer}
.nav-item:hover,.nav-item.active{background:var(--primary);color:#fff}
main{flex:1;display:flex;flex-direction:column}
header{padding:15px;background:#0d1117;display:flex;justify-content:space-between}

.view{display:none;padding:20px;overflow:auto}
.view.active{display:block}

.card{background:var(--card);padding:15px;border-radius:12px;margin-bottom:10px;border:1px solid var(--border)}

input,select{width:100%;padding:10px;margin-top:5px;background:#0d1117;border:1px solid var(--border);color:#fff}
button{padding:10px;margin-top:5px;border:none;background:var(--primary);color:#fff;border-radius:8px;cursor:pointer}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth-screen">
<div class="auth-card">
<h3>UNA Digital</h3>
<select id="loginRole">
<option value="member">Membro</option>
<option value="pastor">Pastor</option>
<option value="treasurer">Tesoureiro</option>
<option value="secretary">Secretário</option>
</select>
<button onclick="App.login()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app-shell">

<aside>
<div class="nav-item active" onclick="App.nav('home',this)">Início</div>
<div class="nav-item" onclick="App.nav('bible',this)">Bíblia</div>
<div class="nav-item" onclick="App.nav('hymnal',this)">Hinário</div>
<div id="nav-treasury" class="nav-item" style="display:none" onclick="App.nav('treasury',this)">Tesouraria</div>
<div id="nav-secretary" class="nav-item" style="display:none" onclick="App.nav('secretary',this)">Secretaria</div>
<div class="nav-item" onclick="App.nav('chat',this)">Chat</div>
<button style="background:var(--danger)" onclick="App.logout()">Sair</button>
</aside>

<main>

<header>
<span id="userNameHeader"></span>
</header>

<div class="container">

<div id="home" class="view active">
<div class="card">
<h4>Versículo</h4>
<p id="dailyVerse"></p>
</div>
<div id="dash-secretary" style="display:none" class="card">
<canvas id="chartMembros"></canvas>
</div>
</div>

<div id="bible" class="view">
<input id="bibleIn">
<button onclick="App.searchBible()">Buscar</button>
<div id="bibleOut"></div>
</div>

<div id="hymnal" class="view">
<input id="hymnIn" onkeyup="App.filterHymns()">
<div id="hymnList"></div>
</div>

<div id="treasury" class="view">
<canvas id="chartFin"></canvas>
</div>

<div id="secretary" class="view">
<input id="certName">
<button onclick="App.genPDF()">Gerar PDF</button>
</div>

<div id="chat" class="view">
<div id="chatBox" style="height:200px;overflow:auto"></div>
<input id="chatIn">
<button onclick="App.sendMsg()">Enviar</button>
</div>

</div>
</main>
</div>

<script>
const App={
user:JSON.parse(localStorage.getItem("una_session")),

init(){
if(this.user)this.showApp();
this.renderHymns();
this.fetchVerse();
},

login(){
let role=loginRole.value;
this.user={role,name:role};
localStorage.setItem("una_session",JSON.stringify(this.user));
this.showApp();
},

logout(){localStorage.clear();location.reload();},

showApp(){
auth-screen.style.display="none";
app-shell.style.display="flex";
userNameHeader.innerText=this.user.name;

if(this.user.role==="pastor"||this.user.role==="treasurer"){
nav-treasury.style.display="block";
setTimeout(()=>this.drawChart("chartFin"),300);
}
if(this.user.role==="pastor"||this.user.role==="secretary"){
nav-secretary.style.display="block";
dash-secretary.style.display="block";
setTimeout(()=>this.drawChart("chartMembros"),300);
}
},

nav(id,el){
document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
document.getElementById(id).classList.add("active");
if(el)el.classList.add("active");
},

renderHymns(){
let list=hymnList;
list.innerHTML="";
for(let i=1;i<=610;i++){
list.innerHTML+=`<div class="card">${i}</div>`;
}
},

filterHymns(){
let q=hymnIn.value;
document.querySelectorAll("#hymnList .card").forEach(el=>{
el.style.display=el.innerText.includes(q)?"block":"none";
});
},

async fetchVerse(){
try{
let r=await fetch("https://bible-api.com/psalms 23:1");
let d=await r.json();
dailyVerse.innerText=d.text;
}catch{}
},

async searchBible(){
let q=bibleIn.value;
let r=await fetch(`https://bible-api.com/${q}`);
let d=await r.json();
bibleOut.innerText=d.text||"Não encontrado";
},

drawChart(id){
new Chart(document.getElementById(id),{
type:"line",
data:{labels:["Jan","Fev","Mar"],datasets:[{data:[10,20,30]}]}
});
},

genPDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();
doc.text("Certificado",20,20);
doc.save("certificado.pdf");
},

sendMsg(){
let box=chatBox;
box.innerHTML+=`<div>${this.user.name}: ${chatIn.value}</div>`;
box.scrollTop=box.scrollHeight;
chatIn.value="";
}
};

window.onload=()=>App.init();
</script>

</body>
    </html>
