<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>União Nordeste de Angola Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#0b0f19;color:#fff;display:flex;height:100vh}
aside{width:260px;background:#111827;padding:20px;overflow:auto}
.nav-item{padding:10px;border-radius:8px;margin-bottom:5px;cursor:pointer}
.nav-item:hover{background:#1f2937}
main{flex:1;display:flex;flex-direction:column}
header{padding:15px;background:#111827;display:flex;justify-content:space-between}
.container{padding:20px;overflow:auto}
.card{background:#1f2937;padding:15px;border-radius:12px;margin-bottom:10px}
input,textarea,select{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:none}
button{margin-top:5px;padding:10px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer}
.view{display:none}
.view.active{display:block}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" style="position:absolute;inset:0;background:#0b0f19;display:flex;align-items:center;justify-content:center;">
<div class="card" style="width:300px">
<h3>Login</h3>
<select id="userSelect"></select>
<button onclick="login()">Entrar</button>
</div>
</div>

<aside>
<h3>UNA Digital</h3>
<div class="nav-item" onclick="nav('dash')">Dashboard</div>
<div class="nav-item" onclick="nav('feed')">Feed</div>
<div class="nav-item" onclick="nav('sec')">Secretaria</div>
<div class="nav-item" onclick="nav('fin')">Tesouraria</div>
<div class="nav-item" onclick="nav('dept')">Departamentos</div>
<div class="nav-item" onclick="nav('biblia')">Bíblia</div>
<div class="nav-item" onclick="nav('chat')">Guia IA</div>
<div class="nav-item" onclick="nav('radio')">Rádio</div>
</aside>

<main>
<header>
<span id="userInfo"></span>
<button onclick="logout()">Sair</button>
</header>

<div class="container">

<div id="dash" class="view active">
<div class="card" id="stats"></div>
</div>

<div id="feed" class="view">
<div class="card">
<textarea id="postText"></textarea>
<button onclick="createPost()">Publicar</button>
</div>
<div id="posts"></div>
</div>

<div id="sec" class="view">
<div class="card">
<input id="mName" placeholder="Nome">
<input id="mContact" placeholder="Contacto">
<select id="mStatus"><option>Ativo</option><option>Inativo</option></select>
<button onclick="addMember()">Adicionar</button>
</div>
<div id="members"></div>
</div>

<div id="fin" class="view">
<div class="card">
<input id="fName" placeholder="Nome">
<input id="fAmount" placeholder="Valor">
<select id="fType"><option>Dízimo</option><option>Oferta</option></select>
<button onclick="addFinance()">Registrar</button>
</div>
<div id="finance"></div>
</div>

<div id="dept" class="view">
<div class="card">
<input id="dName" placeholder="Departamento">
<button onclick="createDept()">Criar</button>
</div>
<div id="deptList"></div>
</div>

<div id="biblia" class="view">
<div class="card">
<input id="bSearch">
<button onclick="searchBible()">Buscar</button>
<div id="bResult"></div>
</div>
</div>

<div id="chat" class="view">
<div class="card">
<div id="chatBox"></div>
<input id="chatInput">
<button onclick="sendChat()">Enviar</button>
</div>
</div>

<div id="radio" class="view">
<div class="card">
<audio controls src="https://stream.radiojar.com/4ywdgup3bnzuv"></audio>
</div>
</div>

</div>
</main>

<script>

/* DB */
let DB=JSON.parse(localStorage.getItem("db"))||{
users:[{name:"Pastor",role:"admin"},{name:"Membro",role:"user"}],
posts:[],members:[],finances:[],departments:[]
};

let session=null;

/* LOGIN */
function loadUsers(){
userSelect.innerHTML="";
DB.users.forEach(u=>{
userSelect.innerHTML+=`<option>${u.name}</option>`;
});
}
function login(){
let name=userSelect.value;
session=DB.users.find(u=>u.name===name);
userInfo.innerText=session.name;
login.style.display="none";
renderAll();
}
function logout(){location.reload();}

/* NAV */
function nav(id){
document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* FEED */
function createPost(){
DB.posts.unshift({id:Date.now(),user:session.name,text:postText.value,likes:0});
save();renderPosts();
}
function like(id){
let p=DB.posts.find(x=>x.id===id);
p.likes++;save();renderPosts();
}
function renderPosts(){
posts.innerHTML="";
DB.posts.forEach(p=>{
posts.innerHTML+=`<div class="card">${p.user}: ${p.text}<br>❤️ ${p.likes}
<button onclick="like(${p.id})">Like</button></div>`;
});
}

/* SECRETARIA */
function addMember(){
DB.members.push({name:mName.value,contact:mContact.value,status:mStatus.value});
save();renderMembers();
}
function renderMembers(){
members.innerHTML="";
DB.members.forEach(m=>{
members.innerHTML+=`<div class="card">${m.name} - ${m.status}</div>`;
});
}

/* FINANCE */
function addFinance(){
DB.finances.push({name:fName.value,amount:Number(fAmount.value),type:fType.value});
save();renderFinance();
}
function renderFinance(){
finance.innerHTML="";
let total=0;
DB.finances.forEach(f=>{
total+=f.amount;
finance.innerHTML+=`<div class="card">${f.name} - ${f.amount}</div>`;
});
stats.innerText="Total: "+total+" Kz";
}

/* DEPT */
function createDept(){
DB.departments.push({name:dName.value,data:[]});
save();renderDept();
}
function renderDept(){
deptList.innerHTML="";
DB.departments.forEach(d=>{
deptList.innerHTML+=`<div class="card">${d.name}</div>`;
});
}

/* BIBLE */
const bible={"joao 3:16":"Deus amou o mundo..."};
function searchBible(){
bResult.innerText=bible[bSearch.value.toLowerCase()]||"Não encontrado";
}

/* CHAT */
function sendChat(){
chatBox.innerHTML+="<div>Você: "+chatInput.value+"</div>";
chatBox.innerHTML+="<div>IA: Confie em Deus</div>";
}

/* SAVE */
function save(){localStorage.setItem("db",JSON.stringify(DB));}

/* INIT */
loadUsers();
function renderAll(){
renderPosts();
renderMembers();
renderFinance();
renderDept();
}

</script>

</body>
    </html>
