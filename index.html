<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IASD Angola Super App</title>

<style>
body { margin:0; font-family:Arial; background:#f4f6f8; }

header { background:#003366; color:#fff; padding:15px; text-align:center; }
nav { display:flex; flex-wrap:wrap; background:#0055a5; }
nav button {
  flex:1;
  padding:12px;
  border:none;
  background:#0055a5;
  color:#fff;
  cursor:pointer;
}
nav button:hover { background:#003f7d; }

.container { padding:15px; }

.card {
  background:#fff;
  padding:15px;
  margin-bottom:10px;
  border-radius:8px;
}

input, select, textarea {
  width:100%;
  padding:10px;
  margin-top:10px;
}

button.primary {
  background:#f5a623;
  color:#fff;
  padding:10px;
  border:none;
  margin-top:10px;
  width:100%;
}

.module { display:none; }
.active { display:block; }

@media(max-width:600px){
  nav button { flex:50%; }
}
</style>
</head>

<body>

<header>
<h2>IASD Angola</h2>
<p>União Nordeste</p>
</header>

<!-- LOGIN -->
<div class="container" id="loginScreen">
<div class="card">
<h3>Login</h3>

<select id="role">
<option value="membro">Membro</option>
<option value="pastor">Pastor</option>
<option value="departamental">Departamental</option>
</select>

<input id="igreja" placeholder="Nome da Igreja">

<button class="primary" onclick="login()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('perfil')">Perfil</button>
<button onclick="show('mensagens')">Mensagens</button>
<button onclick="show('departamentos')">Departamentos</button>
<button onclick="show('relatorios')">Relatórios</button>
<button onclick="show('estrutura')">Estrutura</button>
</nav>

<div class="container">

<!-- HOME -->
<div id="home" class="module active">
<div class="card">
<h3>Painel</h3>
<p id="userInfo"></p>
</div>
</div>

<!-- PERFIL -->
<div id="perfil" class="module">
<div class="card">
<h3>Perfil Institucional</h3>

<input id="nome" placeholder="Nome completo">
<input id="funcao" placeholder="Função (Pastor, Presidente...)">
<input id="nivel" placeholder="Nível (União, Missão...)">
<textarea id="bio" placeholder="Biografia espiritual"></textarea>

<button class="primary" onclick="savePerfil()">Guardar Perfil</button>
</div>

<div id="perfilView"></div>
</div>

<!-- MENSAGENS -->
<div id="mensagens" class="module">

<div id="msgForm" class="card" style="display:none">
<h3>Mensagem Espiritual (Pastor)</h3>
<textarea id="msgText"></textarea>
<button class="primary" onclick="postMensagem()">Publicar</button>
</div>

<div id="msgList"></div>
</div>

<!-- DEPARTAMENTOS -->
<div id="departamentos" class="module">
<div class="card">
<input id="depName" placeholder="Novo departamento">
<button class="primary" onclick="addDep()">Adicionar</button>
</div>

<div id="depList"></div>
</div>

<!-- RELATÓRIOS -->
<div id="relatorios" class="module">
<div class="card">
<select id="depSelect"></select>
<textarea id="relText" placeholder="Relatório"></textarea>
<button class="primary" onclick="addRel()">Enviar</button>
</div>

<div id="relList"></div>
</div>

<!-- ESTRUTURA -->
<div id="estrutura" class="module">
<div class="card">
<h3>Organograma IASD</h3>
<ul>
<li>Conferência Geral</li>
<li>Divisão</li>
<li>União</li>
<li>Missão</li>
<li>Distrito</li>
<li>Igreja Local</li>
</ul>
</div>
</div>

</div>
</div>

<script>

/* BASE */
let db = JSON.parse(localStorage.getItem("db")) || {
  departamentos: [],
  relatorios: [],
  mensagens: [],
  perfis: []
};

let user = null;

/* LOGIN */
function login(){
  let role = document.getElementById("role").value;
  let igreja = document.getElementById("igreja").value;

  user = {role, igreja};

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("userInfo").innerText =
    `Perfil: ${role} | Igreja: ${igreja}`;

  if(role === "pastor"){
    document.getElementById("msgForm").style.display = "block";
  }

  renderAll();
}

/* NAV */
function show(id){
  document.querySelectorAll(".module").forEach(m => m.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* PERFIL */
function savePerfil(){
  let perfil = {
    nome: nome.value,
    funcao: funcao.value,
    nivel: nivel.value,
    bio: bio.value,
    igreja: user.igreja
  };

  db.perfis = db.perfis.filter(p => p.igreja !== user.igreja);
  db.perfis.push(perfil);

  save();
  renderPerfil();
}

function renderPerfil(){
  let view = document.getElementById("perfilView");

  let perfil = db.perfis.find(p => p.igreja === user.igreja);
  if(!perfil) return;

  view.innerHTML = `
  <div class="card">
    <h3>${perfil.nome}</h3>
    <p><strong>${perfil.funcao}</strong></p>
    <p>${perfil.nivel}</p>
    <hr>
    <p>${perfil.bio}</p>
  </div>`;
}

/* MENSAGENS */
function postMensagem(){
  let text = msgText.value;

  db.mensagens.unshift({
    igreja:user.igreja,
    texto:text,
    autor:"Pastor"
  });

  save();
  renderMensagens();
}

function renderMensagens(){
  let list = document.getElementById("msgList");
  list.innerHTML = "";

  db.mensagens
    .filter(m => m.igreja === user.igreja)
    .forEach(m => {
      list.innerHTML += `
      <div class="card">
        <strong>${m.autor}</strong><br>
        ${m.texto}
      </div>`;
    });
}

/* DEPARTAMENTOS */
function addDep(){
  let name = depName.value;

  db.departamentos.push({igreja:user.igreja, nome:name});
  save();
  renderDeps();
}

function renderDeps(){
  let list = document.getElementById("depList");
  let select = document.getElementById("depSelect");

  list.innerHTML = "";
  select.innerHTML = "";

  db.departamentos
    .filter(d => d.igreja === user.igreja)
    .forEach(d => {
      list.innerHTML += `<div class="card">${d.nome}</div>`;
      select.innerHTML += `<option>${d.nome}</option>`;
    });
}

/* RELATÓRIOS */
function addRel(){
  let dep = depSelect.value;
  let text = relText.value;

  db.relatorios.push({
    igreja:user.igreja,
    dep,
    text
  });

  save();
  renderRel();
}

function renderRel(){
  let list = document.getElementById("relList");
  list.innerHTML = "";

  db.relatorios
    .filter(r => r.igreja === user.igreja)
    .forEach(r => {
      list.innerHTML += `
      <div class="card">
        <strong>${r.dep}</strong><br>
        ${r.text}
      </div>`;
    });
}

/* STORAGE */
function save(){
  localStorage.setItem("db", JSON.stringify(db));
}

function renderAll(){
  renderPerfil();
  renderMensagens();
  renderDeps();
  renderRel();
}

</script>

</body>
</html>
