<!DOCTYPE html>
<html lang="pt-ao">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIÃO NORDESTE DE ANGOLA Digital Platform | Ecossistema Integrado</title>
    
    <link href="https://googleapis.com" rel="stylesheet">
    <script src="https://unpkg.com"></script>
    <script src="https://jsdelivr.net"></script>

    <style>
        :root {
            --primary: #002D5E; --accent: #C5A059; --bg: #050a0f;
            --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff; --text-dim: #a0a0a0; --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); background: radial-gradient(circle at top right, #001f3f, #050a0f); min-height: 100vh; overflow-x: hidden; }

        .app-container { display: flex; min-height: 100vh; }
        
        /* Sidebar Glassmorphism */
        .sidebar {
            width: 260px; background: var(--glass); backdrop-filter: blur(20px); border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; padding: 2rem 1rem; position: fixed; height: 100vh; z-index: 100;
        }
        .main-content { flex: 1; margin-left: 260px; padding: 2rem; width: calc(100% - 260px); }

        .logo { font-weight: 700; color: var(--accent); font-size: 1.4rem; margin-bottom: 2.5rem; display: flex; align-items: center; gap: 10px; }
        .nav-label { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin: 1rem 0 0.5rem 1rem; opacity: 0.7; }
        
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 0.8rem 1rem; color: var(--text-dim);
            border-radius: 12px; margin-bottom: 2px; transition: var(--transition); cursor: pointer; font-size: 0.9rem;
        }
        .nav-item:hover, .nav-item.active { background: var(--glass); color: var(--accent); }

        .glass-card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .btn-premium { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s; }
        
        input, select, textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: #fff; margin-bottom: 1rem; outline: none; }

        .hino-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 10px; }
        .hino-btn { padding: 12px 5px; background: var(--glass); border-radius: 10px; text-align: center; cursor: pointer; transition: 0.2s; font-size: 0.8rem; }
        .hino-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(197, 160, 89, 0.1); }

        @media (max-width: 1024px) { .sidebar { width: 70px; padding: 1rem 0.5rem; } .nav-label, .nav-item span { display: none; } .main-content { margin-left: 70px; width: calc(100% - 70px); } }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo"><i data-lucide="cross"></i> UNA</div>
            
            <nav id="menu">
                <div class="nav-label">Gestão</div>
                <div class="nav-item active" onclick="App.router('dashboard')" id="m-dashboard"><i data-lucide="layout-dashboard"></i><span>Estatísticas</span></div>
                <div class="nav-item" onclick="App.router('secretaria')" id="m-secretaria"><i data-lucide="users"></i><span>Secretaria</span></div>
                <div class="nav-item" onclick="App.router('tesouraria')" id="m-tesouraria"><i data-lucide="landmark"></i><span>Tesouraria</span></div>

                <div class="nav-label">Espiritual</div>
                <div class="nav-item" onclick="App.router('biblia')" id="m-biblia"><i data-lucide="book-open"></i><span>Bíblia Real</span></div>
                <div class="nav-item" onclick="App.router('hinos')" id="m-hinos"><i data-lucide="music"></i><span>Hinário 610</span></div>
                <div class="nav-item" onclick="App.router('licao')" id="m-licao"><i data-lucide="library"></i><span>Escola Sabatina</span></div>

                <div class="nav-label">Extra</div>
                <div class="nav-item" onclick="App.router('social')" id="m-social"><i data-lucide="share-2"></i><span>Rede Social</span></div>
                <div class="nav-item" onclick="App.router('ia')" id="m-ia"><i data-lucide="bot"></i><span>UNA AI</span></div>
            </nav>
        </aside>

        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem;">
                <h2 id="view-title">Dashboard</h2>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <span style="font-size: 0.8rem; color: var(--text-dim);">Plataforma Aberta</span>
                    <div style="width: 35px; height: 35px; background: var(--accent); border-radius: 50%;"></div>
                </div>
            </header>

            <div id="content"></div>
        </main>
    </div>

    <script>
        const App = {
            db: {
                hinos: {
                    1: { t: "Cantai ao Senhor", l: "Cantai ao Senhor um cântico novo..." },
                    2: { t: "Ó Adorai o Senhor", l: "Ó adorai o Senhor na beleza da santidade..." }
                },
                licao: "O Grande Conflito: O amor de Deus triunfará sobre o mal. Lição da semana 4 disponível."
            },

            init() {
                this.router('dashboard');
                lucide.createIcons();
            },

            router(view) {
                const container = document.getElementById('content');
                document.getElementById('view-title').innerText = view.toUpperCase();
                document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.id === `m-${view}`));
                
                const views = {
                    dashboard: () => `
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;">
                            <div class="glass-card"><h4>Membros</h4><h2 style="color:var(--accent)">14.250</h2></div>
                            <div class="glass-card"><h4>Tesouraria</h4><h2 style="color:var(--accent)">1.280.400 Kz</h2></div>
                        </div>
                        <div class="glass-card" style="margin-top:20px; height: 250px;"><canvas id="mainChart"></canvas></div>
                    `,
                    secretaria: () => `<div class="glass-card"><h3>Lista de Membros</h3><div style="margin-top:15px; opacity:0.7"><p>• João Gaspar (Ativo)</p><p>• Maria Teka (Ativa)</p></div><button class="btn-premium" style="margin-top:20px; width:auto">Adicionar Membro</button></div>`,
                    tesouraria: () => `<div class="glass-card"><h3>Lançamento Financeiro</h3><input type="number" placeholder="Valor Kz"><select><option>Dízimo</option><option>Oferta</option></select><button class="btn-premium">Processar Relatório</button></div>`,
                    biblia: () => `<div class="glass-card"><h3>Pesquisa Bíblica Real</h3><input type="text" id="b-in" placeholder="Ex: João 3:16" onchange="App.actions.getBible()"><div id="b-out" style="margin-top:20px; line-height:1.7;">Digite a referência...</div></div>`,
                    hinos: () => {
                        let btns = "";
                        for(let i=1; i<=610; i++) btns += `<div class="hino-btn" onclick="App.actions.openHino(${i})">${i}</div>`;
                        return `<div class="glass-card"><h3>Hinário Completo</h3><div class="hino-grid">${btns}</div></div>`;
                    },
                    licao: () => `<div class="glass-card"><h3>Escola Sabatina</h3><p>${this.db.licao}</p></div>`,
                    social: () => `<div class="glass-card"><textarea placeholder="Partilhe seu testemunho..."></textarea><button class="btn-premium">Publicar</button></div>`,
                    ia: () => `<div class="glass-card" style="height:350px; display:flex; flex-direction:column;"><div style="flex:1; color:var(--text-dim)">UNA AI: Como posso ajudar no seu estudo hoje?</div><input type="text" placeholder="Pergunte à IA..."></div>`
                };

                container.innerHTML = views[view]();
                if(view === 'dashboard') this.loadChart();
                lucide.createIcons();
            },

            actions: {
                async getBible() {
                    const ref = document.getElementById('b-in').value;
                    const out = document.getElementById('b-out');
                    out.innerText = "Consultando...";
                    try {
                        const r = await fetch(`https://bible-api.com{ref}`);
                        const d = await r.json();
                        out.innerHTML = `<h4 style="color:var(--accent)">${d.reference}</h4><p>${d.text}</p>`;
                    } catch { out.innerText = "Não encontrado."; }
                },
                openHino(n) {
                    const h = App.db.hinos[n] || { t: "Hino IASD", l: "Letra completa integrada." };
                    alert(`Hino ${n}: ${h.t}\n\n${h.l}`);
                }
            },

            loadChart() {
                const ctx = document.getElementById('mainChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: { labels: ['Jan','Fev','Mar','Abr'], datasets: [{ label: 'Crescimento', data:, borderColor: '#C5A059', tension: 0.4 }] },
                    options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false } } }
                });
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
