<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNA Digital Platform</title>
    <script src="https://unpkg.com"></script>
    <script src="https://jsdelivr.net"></script>
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        :root { --p: #002D5E; --a: #C5A059; --bg: #050a0f; --g: rgba(255,255,255,0.05); --gb: rgba(255,255,255,0.1); --t: #fff; --td: #a0a0a0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--t); overflow-x: hidden; }
        
        .app-shell { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--g); backdrop-filter: blur(15px); border-right: 1px solid var(--gb); position: fixed; height: 100vh; padding: 1.5rem; z-index: 10; transition: 0.3s; }
        .main { flex: 1; margin-left: 260px; padding: 2rem; width: calc(100% - 260px); }

        .card { background: var(--g); border: 1px solid var(--gb); border-radius: 16px; padding: 1.5rem; transition: 0.3s ease; margin-bottom: 1rem; }
        .card:hover { border-color: var(--a); transform: translateY(-2px); }
        
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px; cursor: pointer; color: var(--td); margin-bottom: 4px; font-size: 0.9rem; }
        .nav-item.active { background: var(--g); color: var(--a); border-left: 3px solid var(--a); }
        
        .btn { background: var(--a); color: #fff; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; width: 100%; transition: 0.2s; }
        input, select { width: 100%; padding: 12px; margin-bottom: 1rem; border-radius: 8px; border: 1px solid var(--gb); background: rgba(255,255,255,0.05); color: #fff; outline: none; }
        
        .hino-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
        .feed-post { border-bottom: 1px solid var(--gb); padding: 15px 0; }
        .radio-mini { position: fixed; bottom: 20px; right: 20px; width: 250px; background: var(--p); border-radius: 12px; padding: 10px; display: flex; align-items: center; gap: 10px; z-index: 100; }

        @media (max-width: 768px) { .sidebar { width: 0; padding: 0; overflow: hidden; } .main { margin-left: 0; width: 100%; } }
    </style>
</head>
<body>

    <div class="app-shell">
        <aside class="sidebar">
            <div style="font-weight: 700; color: var(--a); font-size: 1.4rem; margin-bottom: 2rem;">UNA.</div>
            <nav id="menu-nav"></nav>
        </aside>

        <main class="main">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 id="view-title">Dashboard</h2>
                <div style="font-size: 0.8rem; opacity: 0.6;">Acesso Livre | UNA Platform</div>
            </header>
            <div id="view-content"></div>
        </main>
    </div>

    <div class="radio-mini card">
        <i data-lucide="radio" style="color: var(--a)"></i>
        <marquee style="font-size: 0.7rem; flex: 1;">Rádio Adventista UNA - Ao Vivo: Lição da Escola Sabatina</marquee>
        <i data-lucide="play" size="18" style="cursor:pointer"></i>
    </div>

    <script>
        const App = {
            state: { view: 'dashboard' },

            init() {
                this.renderMenu();
                this.go('dashboard');
            },

            renderMenu() {
                const routes = [
                    { id: 'dashboard', icon: 'layout-grid', label: 'Início' },
                    { id: 'social', icon: 'heart', label: 'Rede Social' },
                    { id: 'secretaria', icon: 'file-text', label: 'Secretaria' },
                    { id: 'tesouraria', icon: 'trending-up', label: 'Finanças' },
                    { id: 'biblia', icon: 'book', label: 'Bíblia' },
                    { id: 'hinos', icon: 'music', label: 'Hinos' },
                    { id: 'ia', icon: 'cpu', label: 'UNA AI' }
                ];
                const nav = document.getElementById('menu-nav');
                nav.innerHTML = routes.map(r => `
                    <div class="nav-item" onclick="App.go('${r.id}')" id="n-${r.id}">
                        <i data-lucide="${r.icon}" size="18"></i>
                        <span>${r.label}</span>
                    </div>`).join('');
                lucide.createIcons();
            },

            go(view) {
                this.state.view = view;
                document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
                document.getElementById(`n-${view}`).classList.add('active');
                document.getElementById('view-title').innerText = view.charAt(0).toUpperCase() + view.slice(1);
                
                const container = document.getElementById('view-content');
                this.views[view](container);
                lucide.createIcons();
            },

            views: {
                dashboard(el) {
                    el.innerHTML = `
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                            <div class="card"><h4>Membros Ativos</h4><h2>1.240</h2></div>
                            <div class="card"><h4>Arrecadação</h4><h2>45.200 Kz</h2></div>
                        </div>
                        <div class="card" style="margin-top: 20px; height: 300px;"><canvas id="chart"></canvas></div>`;
                    new Chart(document.getElementById('chart'), { type: 'line', data: { labels: ['Jan', 'Fev', 'Mar', 'Abr'], datasets: [{ label: 'Atividade', data:, borderColor: '#C5A059' }] }, options: { maintainAspectRatio: false }});
                },
                social(el) {
                    el.innerHTML = `<div class="card"><textarea placeholder="O que deseja compartilhar?" style="width:100%; background:none; border:none; color:#fff; outline:none; resize:none;"></textarea><button class="btn" style="width:100px; float:right;">Postar</button></div>
                    <div class="feed-post"><strong>Pr. Manuel:</strong><p>A paz de Cristo! Reunião amanhã às 18h.</p></div>
                    <div class="feed-post"><strong>Comunidade:</strong><p>Bem-vindos à nova rede UNA.</p></div>`;
                },
                biblia(el) {
                    el.innerHTML = `<div class="card"><input type="text" placeholder="Pesquisar ex: Salmos 23"><div style="margin-top:10px; line-height:1.6">"O Senhor é o meu pastor, nada me faltará."</div></div>`;
                },
                hinos(el) {
                    let hinos = "";
                    for(let i=1; i<=610; i++) hinos += `<div class="card" style="padding:10px; text-align:center; font-size:0.8rem;">${i}</div>`;
                    el.innerHTML = `<div class="hino-grid">${hinos}</div>`;
                },
                tesouraria(el) {
                    el.innerHTML = `<div class="card"><h3>Lançamento</h3><input type="number" placeholder="Valor em Kz"><select><option>Dízimo</option><option>Oferta</option></select><button class="btn">Lançar</button></div>`;
                },
                ia(el) {
                    el.innerHTML = `<div class="card" style="height:400px; display:flex; flex-direction:column;"><div style="flex:1; color:var(--td)">UNA AI: Olá! Como posso ajudar hoje?</div><input type="text" placeholder="Escreva aqui..."></div>`;
                },
                secretaria(el) {
                    el.innerHTML = `<div class="card"><h3>Gestão</h3><div class="feed-post">João Afonso - Ativo</div><div class="feed-post">Carla Simão - Ativa</div></div>`;
                }
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
