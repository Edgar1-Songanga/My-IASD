<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IASD Digital Platform</title>

<style>
:root{
  --primary:#003366;
  --accent:#f5a623;
  --bg:#f5f7fb;
  --card:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{background:var(--bg);}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#003366,#0055a5);
}

.login-box{
  background:#fff;
  width:90%;
  max-width:360px;
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

/* APP */
#app{display:none;}

/* HEADER */
header{
  background:var(--primary);
  color:#fff;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* DASHBOARD */
.container{padding:15px;padding-bottom:80px;}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:14px;
  box-shadow:0 6px 15px rgba(0,0,0,0.06);
}

/* MODULES */
.module{display:none;}
.active{display:block;}

/* MENU */
nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  display:flex;
  border-top:1px solid #eee;
}

nav button{
  flex:1;
  background:none;
  color:#333;
  padding:12px;
}

/* ANIMATION */
.card{transition:.2s;}
.card:hover{transform:translateY(-2px);}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h3>IASD Platform</h3>

<input id="name" placeholder="Nome">
<select id="role">
<option value="pastor">Pastor</option>
<option value="secretario">Secretário</option>
<option value="tesoureiro">Tesoureiro</option>
<option value="membro">Membro</option>
</select>

<input id="church" placeholder="Igreja">

<button onclick="login()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app">

<header>
<span id="title">Dashboard</span>
<span id="userLabel"></span>
</header>

<div class="container">

<!-- HOME -->
<div id="home" class="module active">

<div class="card">
<h3 id="welcome">Bem-vindo</h3>
<p id="sessionInfo"></p>
</div>

<div class="grid">
<div class="card">📖 Devocional</div>
<div class="card">🎵 Hinário</div>
<div class="card">📡 Lives</div>
<div class="card">📊 Relatórios</div>
</div>

</div>

<!-- MENSAGENS -->
<div id="messages" class="module">

<div class="card" id="msgBox">
<textarea id="msgInput" placeholder="Mensagem espiritual"></textarea>
<button onclick="sendMessage()">Publicar</button>
</div>

<div id="feed"></div>

</div>

<!-- PERFIL -->
<div id="profile" class="module">

<div class="card">
<input id="bio" placeholder="Biografia espiritual">
<button onclick="saveProfile()">Guardar Perfil</button>
</div>

<div id="profileView"></div>

</div>

</div>

<!-- MENU -->
<nav>
<button onclick="nav('home')">🏠</button>
<button onclick="nav('messages')">📢</button>
<button onclick="nav('profile')">👤</button>
</nav>

</div>

<script>

/* ===== "FAKE BACKEND" ===== */
let DB = JSON.parse(localStorage.getItem("iasd_db")) || {
  users: [],
  messages: [],
  profiles: []
};

let session = null;

/* LOGIN */
function login(){

  session = {
    name:name.value,
    role:role.value,
    church:church.value
  };

  localStorage.setItem("session",JSON.stringify(session));

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  userLabel.innerText = session.role+" | "+session.church;
  sessionInfo.innerText = session.name+" - "+session.church;

  renderMessages();
  renderProfile();
}

/* NAV */
function nav(page){
  document.querySelectorAll(".module").forEach(m=>m.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}

/* MESSAGES (FILTER BY CHURCH) */
function sendMessage(){

  DB.messages.unshift({
    church:session.church,
    role:session.role,
    text:msgInput.value,
    time:new Date().toLocaleString()
  });

  save();
  renderMessages();
}

function renderMessages(){

  feed.innerHTML="";

  DB.messages
  .filter(m=>m.church===session.church)
  .forEach(m=>{
    feed.innerHTML+=`
      <div class="card">
        <b>${m.role}</b><br>
        ${m.text}<br>
        <small>${m.time}</small>
      </div>
    `;
  });

}

/* PROFILE */
function saveProfile(){

  let profile = {
    church:session.church,
    bio:bio.value,
    name:session.name,
    role:session.role
  };

  DB.profiles = DB.profiles.filter(p=>p.church!==session.church);
  DB.profiles.push(profile);

  save();
  renderProfile();
}

function renderProfile(){

  let p = DB.profiles.find(x=>x.church===session.church);

  profileView.innerHTML = p ? `
    <div class="card">
      <h3>${p.name}</h3>
      <p>${p.role}</p>
      <p>${p.bio}</p>
    </div>
  ` : "";
}

/* SAVE */
function save(){
  localStorage.setItem("iasd_db",JSON.stringify(DB));
}

/* INIT SESSION RESTORE */
let saved = localStorage.getItem("session");
if(saved){
  session = JSON.parse(saved);
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  userLabel.innerText = session.role+" | "+session.church;
  sessionInfo.innerText = session.name+" - "+session.church;
  renderMessages();
  renderProfile();
}

</script>

</body>
  </html>
