<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNA Digital | Veltrix OS</title>

<meta name="theme-color" content="#4f46e5">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root {
--bg:#0a0d14; --card:#161b22; --primary:#4f46e5;
--text:#e6edf3; --border:#30363d;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter';}
body{background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}

/* AUTH */
#auth{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:#000;z-index:1000}
.auth-box{background:var(--card);padding:30px;border-radius:15px;width:300px;text-align:center}

/* LAYOUT */
#app{display:none;width:100%}
aside{width:260px;background:#0d1117;padding:20px}
main{flex:1;display:flex;flex-direction:column}
header{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.view{display:none;padding:20px;overflow:auto}
.view.active{display:block}

/* UI */
.nav{padding:10px;border-radius:8px;cursor:pointer;margin-bottom:5px}
.nav.active,.nav:hover{background:var(--primary)}
.card{background:var(--card);padding:15px;border-radius:12px;margin-bottom:10px}
input,select{width:100%;padding:10px;margin-top:5px;background:#000;border:1px solid var(--border);color:#fff}
button{padding:10px;background:var(--primary);color:#fff;border:none;border-radius:8px;margin-top:5px;cursor:pointer}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
<div class="auth-box">
<h2>UNA Digital</h2>
<select id="role">
<option value="member">Membro</option>
<option value="pastor">Pastor</option>
<option value="treasurer">Tesoureiro</option>
<option value="secretary">Secretário</option>
</select>
<button onclick="App.login()">Entrar</button>
</div>
</div>

<div id="app">

<aside>
<h3>UNA</h3>
<div class="nav active" onclick="App.nav('home',this)">Dashboard</div>
<div class="nav" onclick="App.nav('feed',this)">Feed</div>
<div class="nav" onclick="App.nav('bible',this)">Bíblia</div>
<div class="nav" onclick="App.nav('hymn',this)">Hinário</div>
<div class="nav" onclick="App.nav('finance',this)">Tesouraria</div>
<div class="nav" onclick="App.nav('secret',this)">Secretaria</div>
<div class="nav" onclick="App.nav('chat',this)">Chat</div>
<button onclick="App.logout()">Sair</button>
</aside>

<main>
<header>
<div id="user"></div>
</header>

<!-- DASH -->
<div id="home" class="view active">
<div class="card">Bem-vindo ao sistema UNA Digital</div>
<canvas id="chart"></canvas>
</div>

<!-- FEED -->
<div id="feed" class="view">
<div class="card">
<textarea id="post"></textarea>
<button onclick="App.post()">Publicar</button>
</div>
<div id="posts"></div>
</div>

<!-- BIBLE -->
<div id="bible" class="view">
<input id="ref" placeholder="João 3:16">
<button onclick="App.bible()">Buscar</button>
<div id="verse"></div>
</div>

<!-- HYMNS -->
<div id="hymn" class="view">
<div id="hlist"></div>
</div>

<!-- FINANCE -->
<div id="finance" class="view">
<input id="name" placeholder="Nome">
<input id="val" placeholder="Valor">
<button onclick="App.pay()">Registrar</button>
<div id="fin"></div>
</div>

<!-- SECRET -->
<div id="secret" class="view">
<input id="mname">
<button onclick="App.addMember()">Adicionar</button>
<div id="members"></div>
</div>

<!-- CHAT -->
<div id="chat" class="view">
<div id="chatbox"></div>
<input id="msg">
<button onclick="App.send()">Enviar</button>
</div>

</main>
</div>

<script>
const DB = JSON.parse(localStorage.getItem("db")) || {posts:[],members:[],fin:[]}

const App = {

user:null,

login(){
this.user={role:role.value,name:role.value}
localStorage.setItem("user",JSON.stringify(this.user))
auth.style.display="none"
app.style.display="flex"
user.innerText=this.user.name
this.init()
},

logout(){localStorage.clear();location.reload()},

nav(id,el){
document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"))
document.getElementById(id).classList.add("active")
document.querySelectorAll(".nav").forEach(n=>n.classList.remove("active"))
el.classList.add("active")
},

init(){
this.renderPosts()
this.renderMembers()
this.renderFin()
this.hymns()
this.chart()
},

post(){
DB.posts.unshift({u:this.user.name,t:post.value})
this.save();this.renderPosts()
},

renderPosts(){
posts.innerHTML=""
DB.posts.forEach(p=>{
posts.innerHTML+=`<div class="card"><b>${p.u}</b><br>${p.t}</div>`
})
},

addMember(){
DB.members.push({n:mname.value})
this.save();this.renderMembers()
},

renderMembers(){
members.innerHTML=""
DB.members.forEach(m=>{
members.innerHTML+=`<div class="card">${m.n}</div>`
})
},

pay(){
DB.fin.push({n:name.value,v:val.value})
this.save();this.renderFin()
},

renderFin(){
fin.innerHTML=""
DB.fin.forEach(f=>{
fin.innerHTML+=`<div class="card">${f.n} - ${f.v}</div>`
})
},

hymns(){
for(let i=1;i<=50;i++){
hlist.innerHTML+=`<div class="card">Hino ${i}</div>`
}
},

async bible(){
try{
let r=await fetch("https://bible-api.com/"+ref.value)
let d=await r.json()
verse.innerText=d.text
}catch{
verse.innerText="Offline"
}
},

send(){
chatbox.innerHTML+=`<div>${this.user.name}: ${msg.value}</div>`
},

chart(){
new Chart(chart,{type:'bar',data:{labels:["Jan","Fev"],datasets:[{data:[10,20]}]}})
},

save(){
localStorage.setItem("db",JSON.stringify(DB))
}

}

window.onload=()=>{
let u=JSON.parse(localStorage.getItem("user"))
if(u){
App.user=u
auth.style.display="none"
app.style.display="flex"
user.innerText=u.name
App.init()
}
}

/* PWA OFFLINE */
if("serviceWorker" in navigator){
const code=`
self.addEventListener('fetch',e=>{
e.respondWith(fetch(e.request).catch(()=>new Response("Offline")))
})
`
const blob=new Blob([code],{type:"text/javascript"})
navigator.serviceWorker.register(URL.createObjectURL(blob))
}
</script>

</body>
    </html>
