<!DOCTYPE html>
<html lang="pt-ao">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNA Digital Platform</title>
    
    <link href="https://googleapis.com" rel="stylesheet">
    <script src="https://unpkg.com"></script>
    <script src="https://jsdelivr.net"></script>

    <style>
        :root {
            --primary: #002D5E; --accent: #C5A059; --bg: #050a0f;
            --glass: rgba(255, 255, 255, 0.06); --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff; --text-dim: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        .app-container { display: flex; min-height: 100vh; }
        
        /* Sidebar Otimizada */
        .sidebar {
            width: 260px; background: var(--glass); backdrop-filter: blur(20px); border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; padding: 1.5rem; position: fixed; height: 100vh; z-index: 100;
        }
        .main-content { flex: 1; margin-left: 260px; padding: 2rem; width: calc(100% - 260px); }

        .logo { font-weight: 700; color: var(--accent); font-size: 1.3rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 8px; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 0.8rem 1rem; color: var(--text-dim);
            border-radius: 10px; margin-bottom: 4px; transition: 0.2s; cursor: pointer; font-size: 0.9rem;
        }
        .nav-item:hover, .nav-item.active { background: var(--glass); color: var(--accent); }

        .glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: #fff; margin-bottom: 1rem; outline: none; }

        @media (max-width: 900px) { .sidebar { width: 70px; padding: 1rem 0.5rem; } .nav-item span { display: none; } .main-content { margin-left: 70px; width: calc(100% - 70px); } }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo"><i data-lucide="shield"></i> UNA</div>
            <nav id="menu">
                <div class="nav-item active" onclick="App.go('dash')" id="m-dash"><i data-lucide="grid"></i><span>Dashboard</span></div>
                <div class="nav-item" onclick="App.go('sec')" id="m-sec"><i data-lucide="users"></i><span>Secretaria</span></div>
                <div class="nav-item" onclick="App.go('tes')" id="m-tes"><i data-lucide="landmark"></i><span>Tesouraria</span></div>
                <div class="nav-item" onclick="App.go('bib')" id="m-bib"><i data-lucide="book"></i><span>Bíblia</span></div>
                <div class="nav-item" onclick="App.go('hin')" id="m-hin"><i data-lucide="music"></i><span>Hinário</span></div>
            </nav>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 2rem;"><h2 id="v-title">Dashboard</h2></header>
            <div id="v-content"></div>
        </main>
    </div>

    <script>
        const App = {
            init() {
                this.go('dash');
            },

            go(view) {
                const content = document.getElementById('v-content');
                const title = document.getElementById('v-title');
                
                // Limpa estados do menu
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                document.getElementById(`m-${view}`).classList.add('active');

                const routes = {
                    dash: () => {
                        title.innerText = "Estatísticas da Igreja";
                        content.innerHTML = `
                            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                                <div class="glass-card"><h4>Membros</h4><h2>14.250</h2></div>
                                <div class="glass-card"><h4>Tesouraria</h4><h2>1.280k Kz</h2></div>
                            </div>
                            <div class="glass-card" style="margin-top: 15px; height: 200px;"><canvas id="c"></canvas></div>`;
                        this.chart();
                    },
                    sec: () => {
                        title.innerText = "Secretaria Digital";
                        content.innerHTML = `<div class="glass-card"><h3>Membros Registados</h3><p>• Gaspar Afonso</p><p>• Maria Teka</p></div>`;
                    },
                    tes: () => {
                        title.innerText = "Tesouraria";
                        content.innerHTML = `<div class="glass-card"><input type="number" placeholder="Valor Kz"><button class="btn">Lançar Dízimo</button></div>`;
                    },
                    bib: () => {
                        title.innerText = "Bíblia Real";
                        content.innerHTML = `<div class="glass-card"><input type="text" id="bi" placeholder="João 3:16" onchange="App.bible()"><div id="bo" style="margin-top:15px"></div></div>`;
                    },
                    hin: () => {
                        title.innerText = "Hinário IASD";
                        content.innerHTML = `<div class="glass-card"><div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(50px,1fr)); gap:8px;">${Array.from({length: 50}, (_, i) => `<div style="background:var(--glass); padding:10px; border-radius:8px; text-align:center; cursor:pointer;" onclick="alert('Hino ${i+1}')">${i+1}</div>`).join('')}</div></div>`;
                    }
                };

                routes[view] ? routes[view]() : null;
                lucide.createIcons();
            },

            chart() {
                const el = document.getElementById('c');
                if(!el) return;
                new Chart(el.getContext('2d'), {
                    type: 'line',
                    data: { labels: ['S1','S2','S3','S4'], datasets: [{ data: [10, 25, 15, 30], borderColor: '#C5A059', tension: 0.4 }] },
                    options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });
            },

            async bible() {
                const ref = document.getElementById('bi').value;
                const out = document.getElementById('bo');
                out.innerText = "Buscando...";
                try {
                    const r = await fetch(`https://bible-api.com{ref}`);
                    const d = await r.json();
                    out.innerHTML = `<strong>${d.reference}</strong><p>${d.text}</p>`;
                } catch { out.innerText = "Erro ao buscar."; }
            }
        };

        // Início seguro
        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
